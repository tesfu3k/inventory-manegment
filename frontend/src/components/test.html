<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.15/Babel.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;

      const ProductPage = () => {
        const [products, setProducts] = useState([]);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [formData, setFormData] = useState({
          name: "",
          category: "",
          supplier: "",
          price: "",
          stock: "",
          image: null,
          description: "",
        });
        const [editingProduct, setEditingProduct] = useState(null);
        const [filters, setFilters] = useState({
          category: "",
          supplier: "",
          availability: "",
          sortBy: "",
        });

        const categories = ["Electronics", "Clothing", "Food", "Furniture"];
        const suppliers = ["Supplier A", "Supplier B", "Supplier C"];
        const availabilityOptions = ["In stock", "Low stock", "Out of stock"];

        const handleAddProduct = () => {
          setEditingProduct(null);
          setFormData({
            name: "",
            category: "",
            supplier: "",
            price: "",
            stock: "",
            image: null,
            description: "",
          });
          setIsModalOpen(true);
        };

        const handleEditProduct = (product) => {
          setEditingProduct(product);
          setFormData(product);
          setIsModalOpen(true);
        };

        const handleSaveProduct = () => {
          if (editingProduct) {
            setProducts(
              products.map((p) =>
                p.id === editingProduct.id ? { ...formData, id: p.id } : p
              )
            );
          } else {
            setProducts([
              ...products,
              {
                ...formData,
                id: Date.now(),
                image: formData.image || "https://via.placeholder.com/50",
              },
            ]);
          }
          setIsModalOpen(false);
        };

        const handleDeleteProduct = (id) => {
          setProducts(products.filter((p) => p.id !== id));
        };

        const getStockBadge = (stock) => {
          if (stock > 10) return "bg-green-100 text-green-800";
          if (stock > 0) return "bg-yellow-100 text-yellow-800";
          return "bg-red-100 text-red-800";
        };

        const filteredProducts = products
          .filter((p) => !filters.category || p.category === filters.category)
          .filter((p) => !filters.supplier || p.supplier === filters.supplier)
          .filter((p) => {
            if (!filters.availability) return true;
            if (filters.availability === "In stock") return p.stock > 10;
            if (filters.availability === "Low stock")
              return p.stock > 0 && p.stock <= 10;
            return p.stock === 0;
          })
          .sort((a, b) => {
            if (filters.sortBy === "Price") return a.price - b.price;
            if (filters.sortBy === "Stock") return a.stock - b.stock;
            if (filters.sortBy === "Date Added") return b.id - a.id;
            return 0;
          });

        return (
          <div className="min-h-screen bg-gray-100 p-4 md:p-8">
            {/* Header */}
            <div className="flex flex-col md:flex-row justify-between items-center mb-6">
              <h1 className="text-2xl font-bold text-gray-800">Products</h1>
              <div className="flex items-center space-x-4 mt-4 md:mt-0">
                <div className="relative">
                  <input
                    type="text"
                    placeholder="Search Products..."
                    className="pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                  <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                </div>
                <button
                  onClick={handleAddProduct}
                  className="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 flex items-center"
                >
                  <i className="fas fa-plus mr-2"></i> Add Product
                </button>
              </div>
            </div>

            {/* Filters */}
            <div className="flex flex-col md:flex-row md:space-x-4 mb-6">
              <select
                value={filters.category}
                onChange={(e) =>
                  setFilters({ ...filters, category: e.target.value })
                }
                className="p-2 rounded-lg border border-gray-300 mb-2 md:mb-0"
              >
                <option value="">All Categories</option>
                {categories.map((cat) => (
                  <option key={cat} value={cat}>
                    {cat}
                  </option>
                ))}
              </select>
              <select
                value={filters.supplier}
                onChange={(e) =>
                  setFilters({ ...filters, supplier: e.target.value })
                }
                className="p-2 rounded-lg border border-gray-300 mb-2 md:mb-0"
              >
                <option value="">All Suppliers</option>
                {suppliers.map((sup) => (
                  <option key={sup} value={sup}>
                    {sup}
                  </option>
                ))}
              </select>
              <select
                value={filters.availability}
                onChange={(e) =>
                  setFilters({ ...filters, availability: e.target.value })
                }
                className="p-2 rounded-lg border border-gray-300 mb-2 md:mb-0"
              >
                <option value="">All Availability</option>
                {availabilityOptions.map((opt) => (
                  <option key={opt} value={opt}>
                    {opt}
                  </option>
                ))}
              </select>
              <select
                value={filters.sortBy}
                onChange={(e) =>
                  setFilters({ ...filters, sortBy: e.target.value })
                }
                className="p-2 rounded-lg border border-gray-300"
              >
                <option value="">Sort By</option>
                <option value="Price">Price</option>
                <option value="Stock">Stock</option>
                <option value="Date Added">Date Added</option>
              </select>
            </div>

            {/* Product Table (Desktop) */}
            {products.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-12">
                <i className="fas fa-box text-6xl text-gray-400 mb-4"></i>
                <p className="text-gray-600 mb-4">
                  No products available yet. Add your first product to get
                  started!
                </p>
                <button
                  onClick={handleAddProduct}
                  className="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600"
                >
                  <i className="fas fa-plus mr-2"></i> Add Product
                </button>
              </div>
            ) : (
              <>
                <div className="hidden md:block bg-white rounded-lg shadow overflow-x-auto">
                  <table className="w-full">
                    <thead>
                      <tr className="bg-gray-50 text-left text-gray-600">
                        <th className="p-4">
                          <input type="checkbox" />
                        </th>
                        <th className="p-4">Product</th>
                        <th className="p-4">Category</th>
                        <th className="p-4">Price (ETB)</th>
                        <th className="p-4">Stock</th>
                        <th className="p-4">Supplier</th>
                        <th className="p-4">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredProducts.map((product) => (
                        <tr key={product.id} className="border-t">
                          <td className="p-4">
                            <input type="checkbox" />
                          </td>
                          <td className="p-4 flex items-center">
                            <img
                              src={product.image}
                              alt={product.name}
                              className="w-10 h-10 rounded mr-2"
                            />
                            {product.name}
                          </td>
                          <td className="p-4">{product.category}</td>
                          <td className="p-4">{product.price}</td>
                          <td className="p-4">
                            <span
                              className={`px-2 py-1 rounded ${getStockBadge(
                                product.stock
                              )}`}
                            >
                              {product.stock > 10
                                ? "In stock"
                                : product.stock > 0
                                ? "Low stock"
                                : "Out of stock"}
                            </span>
                          </td>
                          <td className="p-4">{product.supplier}</td>
                          <td className="p-4 flex space-x-2">
                            <button className="text-blue-500 hover:text-blue-700">
                              <i className="fas fa-eye"></i>
                            </button>
                            <button
                              onClick={() => handleEditProduct(product)}
                              className="text-yellow-500 hover:text-yellow-700"
                            >
                              <i className="fas fa-edit"></i>
                            </button>
                            <button
                              onClick={() => handleDeleteProduct(product.id)}
                              className="text-red-500 hover:text-red-700"
                            >
                              <i className="fas fa-trash"></i>
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {/* Product Cards (Mobile) */}
                <div className="md:hidden grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {filteredProducts.map((product) => (
                    <div
                      key={product.id}
                      className="bg-white rounded-lg shadow p-4"
                    >
                      <img
                        src={product.image}
                        alt={product.name}
                        className="w-full h-32 object-cover rounded mb-2"
                      />
                      <h3 className="font-semibold">{product.name}</h3>
                      <p className="text-gray-600">{product.category}</p>
                      <div className="flex justify-between items-center mt-2">
                        <span>{product.price} ETB</span>
                        <span
                          className={`px-2 py-1 rounded ${getStockBadge(
                            product.stock
                          )}`}
                        >
                          {product.stock > 10
                            ? "In stock"
                            : product.stock > 0
                            ? "Low stock"
                            : "Out of stock"}
                        </span>
                      </div>
                      <div className="flex justify-end space-x-2 mt-4">
                        <button className="text-blue-500 hover:text-blue-700">
                          <i className="fas fa-eye"></i>
                        </button>
                        <button
                          onClick={() => handleEditProduct(product)}
                          className="text-yellow-500 hover:text-yellow-700"
                        >
                          <i className="fas fa-edit"></i>
                        </button>
                        <button
                          onClick={() => handleDeleteProduct(product.id)}
                          className="text-red-500 hover:text-red-700"
                        >
                          <i className="fas fa-trash"></i>
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* Add/Edit Modal */}
            {isModalOpen && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                <div className="bg-white rounded-lg p-6 w-full max-w-md">
                  <h2 className="text-xl font-bold mb-4">
                    {editingProduct ? "Edit Product" : "Add Product"}
                  </h2>
                  <div className="space-y-4">
                    <input
                      type="text"
                      placeholder="Product Name"
                      value={formData.name}
                      onChange={(e) =>
                        setFormData({ ...formData, name: e.target.value })
                      }
                      className="w-full p-2 border rounded"
                    />
                    <select
                      value={formData.category}
                      onChange={(e) =>
                        setFormData({ ...formData, category: e.target.value })
                      }
                      className="w-full p-2 border rounded"
                    >
                      <option value="">Select Category</option>
                      {categories.map((cat) => (
                        <option key={cat} value={cat}>
                          {cat}
                        </option>
                      ))}
                    </select>
                    <select
                      value={formData.supplier}
                      onChange={(e) =>
                        setFormData({ ...formData, supplier: e.target.value })
                      }
                      className="w-full p-2 border rounded"
                    >
                      <option value="">Select Supplier</option>
                      {suppliers.map((sup) => (
                        <option key={sup} value={sup}>
                          {sup}
                        </option>
                      ))}
                    </select>
                    <input
                      type="number"
                      placeholder="Price (ETB)"
                      value={formData.price}
                      onChange={(e) =>
                        setFormData({ ...formData, price: e.target.value })
                      }
                      className="w-full p-2 border rounded"
                    />
                    <input
                      type="number"
                      placeholder="Stock Quantity"
                      value={formData.stock}
                      onChange={(e) =>
                        setFormData({ ...formData, stock: e.target.value })
                      }
                      className="w-full p-2 border rounded"
                    />
                    <input
                      type="file"
                      accept="image/*"
                      onChange={(e) =>
                        setFormData({
                          ...formData,
                          image: URL.createObjectURL(e.target.files[0]),
                        })
                      }
                      className="w-full p-2 border rounded"
                    />
                    <textarea
                      placeholder="Description (optional)"
                      value={formData.description}
                      onChange={(e) =>
                        setFormData({
                          ...formData,
                          description: e.target.value,
                        })
                      }
                      className="w-full p-2 border rounded"
                    ></textarea>
                  </div>
                  <div className="flex justify-end space-x-2 mt-6">
                    <button
                      onClick={() => setIsModalOpen(false)}
                      className="px-4 py-2 border rounded hover:bg-gray-100"
                    >
                      Cancel
                    </button>
                    <button
                      onClick={handleSaveProduct}
                      className="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600"
                    >
                      Save
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      ReactDOM.render(<ProductPage />, document.getElementById("root"));
    </script>
  </body>
</html>
